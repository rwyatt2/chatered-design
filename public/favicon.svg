<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Paper background -->
  <rect width="64" height="64" fill="#EFEFE9"/>
  <!-- Thick ink border -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#0A0A0A" stroke-width="4"/>
  <!-- Bold C letterform -->
  <text
    x="32"
    y="47"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="44"
    font-weight="900"
    fill="#0A0A0A"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-2"
  >C</text>
  <!-- Accent dot — bottom-right of C -->
  <circle cx="47" cy="49" r="5" fill="#FF3B00"/>
</svg>
